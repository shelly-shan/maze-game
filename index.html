<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>MAZE · 迷宫挑战</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1>MAZE</h1>
            <p class="subtitle">逻辑 · 记忆 · 突破</p>
        </header>

        <!-- 配置面板 -->
        <div id="configPanel" class="config-panel">
            <!-- 难度选择 -->
            <div class="config-section">
                <h2 class="section-title">挑战等级</h2>
                <div class="difficulty-options">
                    <label class="difficulty-option" data-level="medium">
                        <input type="radio" name="difficulty" value="medium" checked>
                        <span class="option-content">
                            <span class="difficulty-name">标准</span>
                            <span class="difficulty-desc">15×15</span>
                        </span>
                    </label>
                    <label class="difficulty-option" data-level="hard">
                        <input type="radio" name="difficulty" value="hard">
                        <span class="option-content">
                            <span class="difficulty-name">困难</span>
                            <span class="difficulty-desc">25×25</span>
                        </span>
                    </label>
                    <label class="difficulty-option" data-level="expert">
                        <input type="radio" name="difficulty" value="expert">
                        <span class="option-content">
                            <span class="difficulty-name">专家</span>
                            <span class="difficulty-desc">41×41</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- 迷雾模式 -->
            <div class="config-section">
                <h2 class="section-title">探索模式</h2>
                <div class="mode-options">
                    <label class="mode-option">
                        <input type="radio" name="fogMode" value="normal" checked>
                        <span class="mode-content">
                            <span class="mode-name">全视</span>
                            <span class="mode-desc">可见全图</span>
                        </span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="fogMode" value="fog">
                        <span class="mode-content">
                            <span class="mode-name">迷雾</span>
                            <span class="mode-desc">视野限制</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- 角色选择 -->
            <div class="config-section">
                <h2 class="section-title">选择标志</h2>
                <div class="character-grid">
                    <label class="character-item" data-char="cat">
                        <input type="radio" name="character" value="cat" checked>
                        <span class="character-avatar">🐱</span>
                    </label>
                    <label class="character-item" data-char="panda">
                        <input type="radio" name="character" value="panda">
                        <span class="character-avatar">🐼</span>
                    </label>
                    <label class="character-item" data-char="fish">
                        <input type="radio" name="character" value="fish">
                        <span class="character-avatar">🐟</span>
                    </label>
                    <label class="character-item" data-char="bird">
                        <input type="radio" name="character" value="bird">
                        <span class="character-avatar">🐦</span>
                    </label>
                </div>
            </div>

            <!-- 开始按钮 -->
            <button id="startBtn" class="start-btn">
                <span class="btn-text">进入迷宫</span>
            </button>

            <!-- 排行榜入口 -->
            <button id="leaderboardBtn" class="leaderboard-toggle">
                <span>排行榜</span>
            </button>
        </div>

        <!-- 游戏区域 -->
        <div id="gameArea" class="game-area hidden">
            <div class="game-header">
                <div class="timer">
                    <span id="timerDisplay">00:00.00</span>
                </div>
                <div class="game-header-center">
                    <button id="lightBtn" class="light-btn hidden" title="开灯（3次）">
                        <span>💡</span>
                        <span id="lightCount" class="light-count">3</span>
                    </button>
                </div>
                <div class="game-controls">
                    <button id="restartBtn" class="icon-btn" title="重新开始">重置</button>
                    <button id="backBtn" class="icon-btn" title="返回主页">退出</button>
                </div>
            </div>
            <div class="maze-container">
                <canvas id="mazeCanvas"></canvas>
            </div>

            <!-- 虚拟方向键 -->
            <div class="d-pad">
                <button class="d-pad-btn up" data-direction="up">▲</button>
                <button class="d-pad-btn left" data-direction="left">◀</button>
                <button class="d-pad-btn down" data-direction="down">▼</button>
                <button class="d-pad-btn right" data-direction="right">▶</button>
            </div>

            <div class="game-instructions">
                <span class="instruction-item">WASD / 方向键</span>
                <span class="instruction-item">滑动操作</span>
                <span class="instruction-item">虚拟按键</span>
            </div>
        </div>

        <!-- 排行榜面板 -->
        <div id="leaderboardPanel" class="leaderboard-panel hidden">
            <div class="leaderboard-header">
                <h2>排行榜</h2>
                <button id="closeLeaderboard" class="close-btn">✕</button>
            </div>
            <div class="leaderboard-mode-tabs">
                <button class="mode-tab-btn active" data-mode="normal">全视模式</button>
                <button class="mode-tab-btn" data-mode="fog">迷雾模式</button>
            </div>
            <div class="leaderboard-tabs">
                <button class="tab-btn active" data-difficulty="medium">标准</button>
                <button class="tab-btn" data-difficulty="hard">困难</button>
                <button class="tab-btn" data-difficulty="expert">专家</button>
            </div>
            <div id="leaderboardContent" class="leaderboard-content"></div>
            <button id="clearRecords" class="clear-btn">清除记录</button>
        </div>

        <!-- 胜利弹窗 -->
        <div id="victoryModal" class="modal hidden">
            <div class="modal-content">
                <h2 class="victory-title">通关成功</h2>
                <p class="victory-time"><span id="victoryTime">00:00.00</span></p>
                <p class="victory-rank" id="victoryRank">-</p>

                <!-- 保存成绩表单（仅前十名显示） -->
                <div id="saveScoreForm" class="save-score-form hidden">
                    <p class="save-prompt" id="savePrompt">🏆 你的成绩进入前十！是否输入 ID 保存？</p>
                    <input type="text" id="savePlayerName" class="save-name-input" placeholder="输入你的 ID" maxlength="10">
                    <div class="save-character-grid">
                        <label class="save-character-item" data-char="cat">
                            <input type="radio" name="saveCharacter" value="cat" checked>
                            <span class="save-character-avatar">🐱</span>
                        </label>
                        <label class="save-character-item" data-char="panda">
                            <input type="radio" name="saveCharacter" value="panda">
                            <span class="save-character-avatar">🐼</span>
                        </label>
                        <label class="save-character-item" data-char="fish">
                            <input type="radio" name="saveCharacter" value="fish">
                            <span class="save-character-avatar">🐟</span>
                        </label>
                        <label class="save-character-item" data-char="bird">
                            <input type="radio" name="saveCharacter" value="bird">
                            <span class="save-character-avatar">🐦</span>
                        </label>
                    </div>
                    <button id="saveScoreBtn" class="modal-btn primary">保存成绩</button>
                    <button id="skipSaveBtn" class="modal-btn secondary skip-btn">跳过</button>
                </div>

                <div id="savedMessage" class="saved-message hidden">
                    <p>成绩已保存</p>
                </div>

                <div class="modal-buttons">
                    <button id="playAgainBtn" class="modal-btn primary">再战</button>
                    <button id="exitGameBtn" class="modal-btn secondary">退出</button>
                    <button id="victoryLeaderboardBtn" class="modal-btn secondary">排行榜</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/maze.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
